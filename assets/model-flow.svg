  <rect x="372" y="864" width="220" height="44" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#4A1B0C" x="482" y="882" text-anchor="middle" dominant-baseline="central">Case assistant chat</text>
