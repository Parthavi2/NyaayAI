  <line x1="326" y1="566" x2="352" y2="566" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="354" y="538" width="278" height="56" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#412402" x="493" y="558" text-anchor="middle" dominant-baseline="central">LLM layer</text>
